<!DOCTYPE html>
<html>
<head>
    <title>Painel - {{ nome }}</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .btn-convidar { background: #007bff; color: white; padding: 10px; border-radius: 5px; text-decoration: none; font-size: 14px; }
        .link-area { background: #333; padding: 10px; margin: 15px 0; border-radius: 5px; color: #25d366; }
        .card { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #25d366; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📥 Mensagens: {{ nome }}</h2>
        <a href="/gerar_link" class="btn-convidar">➕ Gerar Novo Link de Convite</a>
    </div>

    {% if link_convite %}
    <div class="link-area">
        <strong>Link para os funcionários:</strong><br>
        https://app-an-nimo.onrender.com/enviar/{{ link_convite }}
    </div>
    {% endif %}

    <div style="margin-top: 20px;">
        {% for m in mensagens %}
            <div class="card">{{ m }}</div>
        {% endfor %}
    </div>
</body>
</html>
