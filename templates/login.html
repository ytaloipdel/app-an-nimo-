<!DOCTYPE html>
<html>
<head>
    <title>Login Administrativo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #333; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #25d366; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .erro { color: #ff4444; font-size: 0.9em; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="text-align: center;">Acesso Empresa</h2>
        <form action="/login" method="POST">
            <input type="text" name="usuario" placeholder="Usuário" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        {% if erro %} <p class="erro">{{ erro }}</p> {% endif %}
    </div>
</body>
</html>
