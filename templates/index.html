<!DOCTYPE html>
<html>
<head>
    <title>Chat Anonimo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #e5ddd5; font-family: sans-serif; text-align: center; padding: 20px; }
        .caixa { background: white; padding: 20px; border-radius: 10px; max-width: 300px; margin: auto; }
        textarea { width: 100%; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
        button { background: #25d366; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="caixa">
        <h3>Mande uma mensagem anônima</h3>
        <form action="/enviar" method="post">
            <textarea name="conteudo" rows="4" placeholder="Escreva aqui..."></textarea>
            <button type="submit">Enviar pelo WhatsApp</button>
        </form>
    </div>
</body>
</html>
